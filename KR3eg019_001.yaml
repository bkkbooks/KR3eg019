body:
  text: 卷上一溫病與傷寒瘟疫受症不同治法亦異今醫見人有外感不分六淫風寒暑濕燥火之邪但云時邪不知標本即斷曰七天症候七日不解則曰十四天症不知傷寒之邪寒從表入溫熱之病熱從里發水熱穴論帝曰人傷於寒而傳為熱者何也岐伯曰夫寒甚則生熱也葉氏曰春夏溫熱之病必自內而及外元按俱指伏邪而言若外受濕熱之氣由口鼻而入則為時邪詳發瘟疫之邪客於膜原也然傷寒以六經太陽陽明少陽太陰少陰厥陰為主內經有之一日太陽膀胱經二日陽明胃經三日少陽膽經四日太陰脾經五日少陰腎經六日厥陰肝經至七日傳經盡而太陽病衰八日陽明衰九日少陽衰十日太陰衰十一日少陰衰十二日厥陰衰以上視何症衰何症詳素問熱病論中治之各通其臟脈病日衰已矣若七日有來復之義並無復傳之說蓋厥陰至太陽有數經之隔豈有遽出而傳太陽之理即七日傳經在內經亦明白示人知在太陽即在太陽治之不必待傳陽明也知在陽明不必待傳少陽也其餘仿此不可以日拘之也如一日至四五日但見頭痛惡寒無汗脈浮緊為太陽經症麻黃湯汗之若見大熱大汗脈洪長為陽明經症白虎湯主之虛者加人參蓋人有虛實不同有氣體素旺太陽受邪經三四日而不傳經陽明者有稟質素弱太陽受邪半日後而傳陽明者此豈可以呆法治之凡此論之乃論傷寒也若溫病則大不同其病來源有二伏邪時邪一因冬傷於寒寒伏少陰腎經即易學潛龍勿用陽氣潛藏之意不及時而發即時而發寒在膀胱太陽表症故曰傷寒若寒伏不發由壬傳癸則化為熱如花爆已成專矣引線一因冬應寒而溫春應溫而寒夏宜熱而涼秋宜涼而熱其邪六淫之邪兼有不但只寒熱由口鼻而入即引線首先犯肺逆傳心胞引出冬令少陰化熱之邪如易理龍本潛藏因春雷一震則龍噓氣成云初在田次在淵再次則在天矣有譫妄神昏之慮治以辛涼苦寒辛涼解表苦寒清裡此指時邪引動伏邪者仿內經之法奈人不審見溫病初起即用達原飲不愈即用下以致害人無算夫瘟疫論著於吳又可名有性姑蘇人伊本明末人其時兵荒相繼百姓流離其死溝壑者不知幾千萬則屍氣化為癘氣流行於天壤之間中其氣者挨門逐戶無不受病且傳染無窮吳氏窺破非六淫之邪乃天地間別有一種異氣溫病條辨認為溫瘟疫亦用銀翹散者未免牽合由口鼻而入與溫病同客於膜原與溫病在肺胃有異故制達原飲此飲以檳榔為君能除嶺南之癘厚朴破戾氣所結草果氣雄除伏邪蟠踞以達膜原之邪以上三味協力直達巢穴使邪氣潰散速離膜原因是癘氣且宜急下今坊間新刻醫案言伏邪溫病不用黃芩湯而用達原加芒硝大黃此乃不知瘟疫之邪暫伏膜原溫病之邪久伏於腎也因而著瘟疫論二卷崇禎十五年八月著可謂獨開生面果遇瘟疫之年其法亦不可廢瘟疫之歲不常有如行則宜參合鄭氏瘟疫明辨劉氏松峰說疫萬氏保命歌括之法今之溫熱與瘟疫不同何可不分而妄施達原以夭人長命也二溫病要知源流入手方可不錯天有冬夏病有寒熱既有傷寒豈無溫熱岐黃辨問甚明見素問熱病論夫傷寒而列熱病論中可見傷寒溫病始同而終異也至秦越人難明內經言熱病根於傷寒即易經陽卦根於乾復陰卦根於坤姤之意故曰熱病者傷寒之類也見難經五十八難歷周至漢仲景先師姓張名機字仲景南陽人住臥龍崗見陳修園十六種著傷寒雜病論一十六卷仲景著傷寒雜病論合十六卷可見當時傷寒與雜病合而為一也惜其書散失至晉太醫王叔和收採仲景遺論只有不全傷寒十卷遂曰傷寒論至唐王冰在館閣蠹簡中得仲景雜病論三卷遂更曰金匱要略合計十三卷尚缺三卷後賢謂遺佚卒病與熱病論者此之謂也其論曰太陽病發熱而渴不惡寒者為溫病禁汗下燒針三法詳見陳修園傷寒淺注中可見溫熱之症仲景已瞭然於胸中矣按仲師論溫熱病乃伏邪也方尚失傳其於時氣溫熱從上受者則遺佚可知李唐而後千金孫真人著外臺王燾著金元以下河間劉完素字守真河間人東垣李杲字東垣惟河間宣明論方及原病式能明熱病按河間論溫熱乃時邪也當以三焦為主上焦肺心中焦脾胃下焦肝腎故葉案云河間溫熱須究三焦實發岐黃之秘惜方法未備丹溪朱彥修字震亨著心法及金匱鉤元格致餘論諸書熱病一門方論未著丹溪惟補陰潛陽及諸症因痰所致者頗有卓識其時王履字安道丹溪之徒也見醫學入門亦著傷寒溫熱病說辨傷寒宜辛溫以寒方從表入溫熱宜苦寒寒已化熱直從里發王孟英云此謂伏氣發為溫熱若外感風溫暑熱皆上焦先受其說較河間更清亦未克悟苦寒之方見附刻東垣十書溯洄集降至明季著書者不少薛立齋醫案張景岳全書李時珍綱目王肯堂準繩備殘缺皆無功於溫病唯喻昌字嘉言明末人能遵河間三焦法以著溫病見醫門法律雖超越古人其方亦未免以傷寒牽合由此觀之溫病自長沙仲景官任長沙太守論失散以來千有餘歲皆似醒非醒醫道之難明固如是哉然理難終失道有必開故我朝天士葉氏名桂字天士號香岩古吳人明哲過人集聖賢之奧妙運用於一心先生無書不讀不論書之精粗能捨短取長化偏為純昔賢謂泰山不吝土壤者此之謂也而著溫熱論曰首先犯肺邪從口鼻而入鼻竅通於肺此指標而言即時邪也詳後逆傳心包肺屬金心包屬火金傳火故曰逆八字真可謂獨闢鴻蒙揭日月於中天其立法以辛涼為主遵內經風淫於內治以辛涼佐以苦甘熱淫於內治以鹹寒佐以甘苦是也至嘉慶間吳氏鞠通名塘淮陰人因親得溫病被醫誤用辛溫表散王安道云誤攻其里亦無大害誤發其表變不可言喻嘉言尚論篇云邪入既深不能邃出但覺昏憒無奈其發熱也全在骨髓之間自覺極熱而捫之反不烙手任行表散汗出而邪不出徒傷津液以取危困以致傳裡不救遂自憾將至重之身委任凡醫誤死此由人子不知醫之過也觀此則岐黃之書不獨業醫者朝夕習學即孝心人亦不可不讀欲知迎醫之法須看徐靈胎醫學源流內病家論一例即無誤矣遂發憤習醫得葉氏餘緒而著溫病條辨頗有發揮其方者用桂枝湯而不用蔥豉湯未若葉氏純正無疵吳氏治溫病初起惡風寒者不遵葉用蔥豉湯而用桂枝湯但熱不惡寒而渴者不遵葉氏用黃芩湯而用銀翹散要知新邪外受只宜辛涼不宜辛溫裡熱內發只宜苦寒不宜辛涼若果天質極高只細參葉案已思過半矣近時王氏名士雄字孟英海寧人著溫熱經緯以內經冠首葉氏法在其中小注頗有益人處末附溫熱贅言寄瓢子述見三家醫案注中更其藥品正如去稂莠以保嘉禾實是寄瓢子之功臣也茲特以溫病來原細細歷辨欲同志者知南車為迷路而設安敢好為辨論哉三伏邪有本無標時邪有標無本葉氏溫病醫案本分別伏邪伏者邪藏少陰時邪時者天時非令之邪客於肺衛標本之理葉案云近日風溫上受先與辛涼清上者時邪也津液不勝喉燥舌黑法當清解血分者伏邪也此即經云從外之內者治其外從內之外者調其內也惜醫統云時氣或概稱伏邪反致學者胸無定見下筆誤人此乃未識靈素之旨也元細思熱病論與金匱真言方明葉氏時邪伏邪分清之妙其熱論云凡傷寒冬令傷寒不即時發藏於少陰也而而字轉語承上起下之詞成溫病者傷寒化熱已成溫病無寒可知言伏邪也金匱真言對面藏於精者春不病溫是正面則對面非冬不藏精春必病溫乎云冬不藏精陰陽應象大論曰冬傷於寒春必病溫此云冬不藏精只言少陰已虛耳不言傷寒言其人雖不藏精並未外傷寒既未傷寒無熱可化少陰不熱吾故曰時邪無本也春必病溫者冬令腎虛至春陽氣發泄腠理不固其風溫之邪乘虛由口鼻而入客於肺衛上焦受邪吾故云時邪有標也言時邪也由茲觀之時邪輕有標無本如外有敵兵內無接應而伏邪重也有標有本如兵家裡應外合此指伏邪外有新邪勾引者下同然有伏邪反輕標本邪俱微如有萬人守城糧餉所少無幾敵有五百人久伏於內令外有二千人攻城雖是裡應外合就竟吾眾彼寡吾逸彼勞不難一戰而解也時邪反重者本雖無而標邪甚者如城池不固軍微糧少內雖無他兵而敵整旅而來以強制弱以多勝寡若內無運籌之人外無救援之兵而城不破者鮮矣亦不可不知也且時邪雖有春風溫為春邪夏暑熱為溫邪秋秋宜涼而熱為秋邪冬冬宜寒而溫為冬邪之分皆系熱邪由口鼻而入治以辛涼鹹寒妄投辛溫燥熱葉案風溫第三案言醫投羌防之弊溫熱第三案言溫邪誤表劫津之弊張褚二案言以傷寒六經治溫熱三焦之弊吳案言溫邪於經為病今世多以足經法劫奪胃津之弊者是也先聖經云風淫於內治以辛涼熱淫於內治以鹹寒後賢葉案云溫邪忌汗忌發汗非忌出汗也彰彰可考奈人不信葉氏辛涼之道以為天下有風寒而無溫熱只知用麻黃桂枝葉氏景岳發揮云霜降後天氣嚴寒觸冒之者名曰傷寒故仲景麻黃桂枝以散外之寒邪若春夏天令暄熱之時必不可用也及荊防柴葛發表之方無怪乎劫爍津液逼邪入里葉氏幼科云風溫肺病治在上焦夫春溫忌汗初病投劑宜用辛涼若雜入消導發散不但與肺病無涉劫盡胃汁肺乏津液上供頭目清竅徒為熱氣熏蒸鼻乾如煤目瞑或上竄無淚或熱深肢厥狂燥躁溺澀胸高氣促皆是肺氣不宣化之徵斯時若肺藥少加一味清降使藥力不致直趨腸中而上痹可開諸竅自爽無知市醫僉云結胸皆用連蔞柴枳苦寒直降致閉塞愈甚告斃者多王孟英按喻氏云人生天真之氣即胃中之津液是也故治溫熱諸病首宜瞻顧及此董廢翁云胃中津液不竭其人必不即死皆見到之言也孟子曰冬日則飲湯熱湯夏日則飲水冷水雖田夫紅女莫不知冬寒宜溫夏熱宜涼今醫概用辛溫而不用辛涼者大約以太虛天包乎外地在天中為大氣所舉故曰太虛之中有冬而無夏也豈理也哉夫伏邪不因時邪而里發即仲景云太陽病發熱而渴不惡寒者葉氏云寒邪深伏已經化熱昔賢以黃芩湯為主方苦寒直清裡熱熱伏於陰苦味堅陰乃正治也元按不因時邪者蓋絕無新邪勾引故不用辛涼而用苦寒為初起之方若里由血分以達氣分法當先清血分次解氣分如初起一二日即現神糊耳聾色黑唇焦津液不騰脈象沉數甚則肢厥而痙當以犀角地黃及清營紫雪等方急清血分深伏之邪若營氣復得一分則邪氣出得一分漸漸由血以達氣如盜賊由內室而出於廳堂此時必然大渴大飲有汗脈洪而長舌黑變黃盡現氣分諸候遂更竹葉石膏及人參白虎等湯則邪解正復脈靜身涼故柳氏賓嵎先生與元同診嘗云血分之邪非達氣分不能解可謂得葉氏之要旨也苟誤用辛溫之劑汗之其內蘊之熱得辛溫而益熾不特汗後身不涼靜而且發汗已身反灼熱者河間原病式云裡熱鬱結不當發汗誤以辛甘熱藥發之不唯攻表不中病而病反轉加也葉氏景岳發揮注云發熱而渴者此熱邪在內也發熱不渴者此熱邪未入內也宜解表發汗若溫病熱病邪氣自內達外未可輕用發汗若誤汗之禍不可言是溫病為風藥所壞遂變重症名曰風溫王孟英云春溫之先犯手太陰者曰風溫乃吸受之溫風也此伏邪內發誤汗致逆者亦曰風溫乃內動之虛風也則傷寒論中可考也至於伏邪因時邪勾引寒伏少陰業已化熱加之春應溫而反寒其寒傷營必身熱微寒無汗表實王安道云即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證喻嘉言云溫病或有新中風寒者或有表氣虛不禁風寒者衛虛則惡風營虛則惡寒又不可因是遂指為非溫病也然即有之亦必微而不甚脈數溲赤尺膚熱少陰伏熱邵新甫所謂在裡之溫邪欲發在外之新邪又如是耳葉氏景岳發揮注云寒邪郁遏陽氣不得伸越至春時強木旺之月復感風寒觸動因之伏邪而發為溫病夏至後發者為熱病俱自內達外當從河間法不可作傷寒治治以葛氏蔥豉湯葉氏春溫篇於新邪引動伏邪以此方主之或吳氏銀翹散去竹葉加蔥白先解表寒俟表解後伏熱全透再進苦寒清裡葉氏云若以外邪先受引動在裡伏熱必先辛涼以解新邪繼進苦寒以清裡熱此先治其標後治其本元按此乃寒邪勾引者其餘風溫勾引者詳見後第八篇主於春令但受風溫之邪犯於肺衛必身熱惡風有汗表虛寸口獨大口渴溲赤名曰時邪即風溫宜清露飲加薄荷牛蒡子以清肅上焦得從外解則不傳矣若邪不解竟入中下二焦者以中下之法治之按此乃外受風溫者其餘外受溫熱暑邪者詳見後第八篇故經曰知標知本萬舉萬當不知標本是謂妄行四治溫病以三焦為主以手太陰為始劉河間謂溫病以三焦為主至葉氏謂邪從口鼻而入先傷上焦肺衛心營次傳心中下詳後非冬令傷寒先傷太陽膀胱次傳六經可比葉氏云劉河間創議迥出諸家謂溫熱時邪當分三焦投藥以苦辛寒為主若拘六經分症仍是傷寒治法致誤多矣元按傷寒功在救陽故仲景時時護陽溫病功在救陰故河間天士刻刻存陰況寒屬坎熱屬離寒從下起坎卦在下膀胱亦在下熱從上始離卦在上肺心亦在上二者如下損從腎上損從肺之不同也見難經以手太陰肺經為始因位置極高通乎天氣故熱傷氣也初則微惡風寒有汗微寒是肺金本寒非無汗表實身熱有汗口微渴脈動數傷寒脈浮緊傷風脈浮緩今脈動數右寸獨大故為時邪風溫舌白邪在肺為表肺屬金金色白也溲赤傷寒傷風初起小溲不赤唯伏邪時邪小溲必赤然時邪無本溲赤稍遲也宜以辛涼輕劑清解為先大忌辛溫消散劫爍津液辛涼如牛蒡薄荷桑葉象貝花粉銀花連翹山梔赤芍桔梗沙參竹葉蘆根之類無汗惡風寒者加蔥白豆豉之屬辛溫如荊芥防風羌活柴胡葛根白芷川芎檳榔蘋果藁本蒼朮厚朴蘇子菔子山楂麥芽橘皮觀音柳之類冬溫尤忌桔梗杏仁薄荷以冬溫陽不潛藏真氣已虛不宜再投泄氣之品葉氏吳案可證因銀翹散有薄荷桔梗治冬溫與案不洽故元擬清露飲以補之詳列方以症在上焦不得用中下之理況內經稱上焦如霧須用清方合上病治上之旨葉案云痰潮神昏乃熱氣蒸灼無形無質此滑痰消食清火竟走腸胃與病情隔靴搔癢又云病在上者治其上勿犯中下二焦又云雨露從天下降炎蒸有掃蕩無餘故吳鞠通云治上焦如羽非輕不舉也奈人不明此理但見形症狀如傷寒傷寒初起脈浮緊溫熱初起脈動數似乎瘟疫瘟疫始則有屍氣溫熱始則無屍氣而議麻黃青龍溫熱在肺而用膀胱之方及達原三消溫病在肺而用膜原之方之方宜其燥劫真陰以致譫妄內閉而死此乃未觀寓意草喻嘉言草首篇先識病後議藥之奧妙也五治溫病須善用手厥陰之方斯為妙手溫病入上焦初在肺手太陰次傳心胞手厥陰終傳心臟手少陰故葉案云症在手經手三陰不得用足經足六經之理第症在肺衛時而用辛涼對症之方有汗不惡寒者以清露飲無汗微惡寒者以銀翹散去竹葉加蔥白云吸邪至重傳至胞絡止只譫語不致神昏若誤用辛溫發表之劑如九味羌活柴葛解肌參蘇飲及吳氏三化湯達原飲等方必然日見沉重河間傷寒醫鑑云熱病以熱藥治之者比如驕主得佞臣縱恣禍及滅亡更不覺佞臣之惡唯其同好之可樂使熱勢轉甚以致陽厥身冷脈微反陽為陰至死不悟雖吸邪極輕亦忌逼邪逼邪者亦辛溫之方入臟心臟竊設善用手厥陰之方者言邪已入心胞自傳者輕誤治者重如易卦巳在三四兩爻初二兩爻如邪潛方見肺衛見病也三四兩爻如邪勢方張胞絡見症也五六兩爻如邪已勝正心臟見病也醫者於此必審邪在肺衛心胞各居幾分如肺衛七分心胞三分當以肺衛為主稍加心胞之品如傷寒桂枝加葛根湯之意以桂枝湯治太陽七分葛根治陽明三分也如肺衛三分心胞七分當以心胞為主稍加肺衛之品如傷寒麻杏石甘湯之意以石膏治陽明七分麻黃治太陽三分也此借傷寒解溫病用方配合之法方可不失中和倘不知消長盈虛之理見其舌黃大渴脈數肺衛七分微有譫語煩躁心胞三分而用犀角地黃及紫雪至寶牛黃等入心之品菖蒲鬱金之類反致沉昏不語而死此乃自開心竅請邪入內豈非病輕藥重耶張景岳云耘禾之生嘉禾之賊也有一去一有二去二若有一去二傷一禾矣有二去四傷二禾矣更有見神昏舌黑肢冷熱厥手搐心胞七分口渴微飲邪未離肺尚有三分而用人參白虎加生地麥冬羚羊之品此乃邪已入室心胞漸傳心臟藥僅升堂肺胃二經藥多也豈非病重藥輕耶張景岳云給餉一人一升十人一斗日餉足矣若百人一斗千人一斛三軍之眾豈能活哉此二症生者少而死者多因平素未能真明內經權衡規矩之法薛生白雲權衡規矩所包者多權言其重衡言其輕規言其圓矩言其方能明方圓輕重之理則知變通之道焉六治溫病用藥要知中病即已切不可過溫病在肺衛宜辛涼苦甘如銀翹散清露飲及清心涼膈散白虎湯在心胞宜鹹寒甘苦如玉女煎犀角地黃湯清宮湯在心營宜芳香開竅如清營湯及牛黃丸至寶丹紫雪丹以上證治輕重有序毫釐千里若症宜辛涼而用鹹寒謂之太過如應用鹹寒而以辛涼謂之不及更有鹹寒輕症邪微而用大劑過病所辛涼重症初邪重而用小方不及病亦謂之太過不及皆不中病也以上論時邪治法伏邪仿此內經云症有輕重方有大小此之謂也然有不善習河間之學者葉氏景岳發揮注云河間治病未嘗專用寒涼觀其宣明論方保命集用藥仍有溫熱地黃飲子亦有桂附何得謂專用寒涼也元按河間一生精力全在原病式書中以亢則害承乃制為骨子以比物立象為化裁足以羽翼聖經啟導後學故元有補註原病一卷刊刻世間以質明哲也但知世間之症非火不生此只知有夏而不知有冬莊子所謂夏蟲不可以語水者此也不問邪之輕重概用黃連石膏苦寒傷胃以為大塊之中唯水能生萬物豈知雨能生木雨多亦能滅木也易經曰澤滅木者澤多反不生也見太過象傳故每見溫病服涼藥太過如禾苗漸枯專望時雨以救之若大雨滂沱連旬不睛晴反傷禾苗之根而傷真火命門之火以致汗出肢冷煩躁欲寐少陰病但欲寐面反如妝真陽不潛危如朝露難經云旦占夕死夕占旦死急用參附湯加童便引導或人參四逆湯加人尿豬膽汁冷服徐子默吊腳痧云熱溺冷服冷味可去浮陽熱性可怯陰寒格陽症中兩得之法蓋陽無陰不生也以挽碩果危陽大旱固然望雨大澇可不望睛晴乎碩果者以易剝卦五陰在下一陽在上如此病象其上九曰碩果不食謂其不遠之復以下仁也解見程伊川易傳若能汗收如雨止肢熱天漸睛晴方有復反之機反陽潛也非病反也易說卦傳云剝爛也復反也否則百難救一又有膽小膽小不如心細之醫亦知治溫病之法如症當以鹹寒心胞方而姑以辛涼肺衛方應用重劑而姑以輕方以致津液涸盡河間傷寒醫鑑云病勢大藥力小而自死者亦不知杯水救車薪之火為非譬如敵來數萬在前攻城破邑而禦敵之師數百在後虛張聲勢此只知望敵而不知迎敵也此二症一大過一不及皆不知中病得中和之旨也七治溫病要知上焦心主強健邪氣舍心胞而順傳中下者虛先受也溫病由肺傳心胞一定不易之法然有心主強健心主本健今云強者較常人更堅也則邪避實擊虛武侯心書云見其虛則進見其實則止兵法通醫故邪來亦如是不譫言忘沉昏不傳心胞者即難經五十六難曰王者不受邪之意但脈實胸滿腹痛失氣王孟英云肺與腸胃一氣相通溫熱究三焦以此二臟二腑為最要肺開竅於鼻吸入之邪先犯於肺肺經不解則傳於胃謂之順傳不但臟病傳腑為順而自上及中順流而下其順也有不待言者故溫熱以大便不閉者為易治為邪有出路也若不下傳於胃而內陷心胞絡是不但以臟傳臟且其邪由氣分入營分較順傳尤變之速故曰逆傳也元按王氏從溫熱論不從外解必致里結悟出里結於何在陽明胃與腸也亦須用下法參之宜涼膈散及太大小承氣湯加減丹溪格致餘論載羅太無雲用古方治今病正如拆舊屋揍新屋其材木不一非再經匠氏之手其可用乎取釜底抽薪之意若應下失下下遲燥屎結腸大腸正氣又衰難以峻攻者若孟浪用峻攻之法未有不邪正同亡者以養陰潤腸法如增液湯五仁飲煎湯送下麻仁丸設肛門如錢燥糞如拳又須用蜜煎導法豬膽汁方之類回其津液葉案云養得一分正氣即退得一分邪氣保得一分津液即存得一分性命則燥屎自下取水盛則舟自行之意更有地道不通燥結已久其邪由中下反蒸上焦心胞而譫語神迷者如敵知南實北虛先攻北方熟知北方雖虛其路不通南方雖實困久必虛故敵見南反虛北反實又復四回兵攻南也當此之時三焦合病日期又多欲攻邪則礙正欲補正則留邪昔陶氏節庵有黃龍湯之法然不若近世費伯雄字晉卿武進人醫醇剩義之法妥善費晉卿雲人參大黃並用用意佳究竟互相牽制補者不補而攻者不攻不若先服攻下之劑俟藥力已達病所隨後即服保納元氣之劑以收攝之元按此從丹溪格致餘論治葉先生之案對而悟出以黃龍湯攻中寓補費氏法先攻後補也費法先勝而後求戰陶法先戰而後求勝八伏邪時邪多端要辨大同小異伏邪者有溫病仲景傷寒論云太陽病不惡寒但惡熱而渴者為溫病葉氏謂伏氣直從里發無標邪勾引宜黃芩湯元按葉氏因伏邪里發無新邪故用苦寒也有風溫亦曰春溫立春後風木主政其風合溫暖之氣客於肺衛引出冬令所潛之熱必口渴有汗惡風如春應溫而寒其風合寒冷之氣傷於營分亦引出冬令所藏之熱必口渴溲赤無汗惡寒伏邪合溫者以清露飲加薄荷牛蒡子伏熱合寒者以銀翹散加蔥白次治標重於本之法若本重於標者宜黃芩湯加辛涼法後仿此類推有風溫晚發風溫在清明後者為晚發有溫熱立夏後火淫主政陽氣盡泄由溫和而為溫熱其溫熱之氣犯於肺衛勾動冬令潛伏之熱必身熱有汗脈數溲赤較風溫稍重以溫者熱之漸熱者溫之深治以清露飲以溫熱無風邪故不加薄荷牛蒡子也有暑病夏至後赤帝司權暑氣流行其暑氣客於肺胃引出冬令寒邪所犯之熱必面赤汗大出口渴脈洪此較溫熱更重以熱者暑之漸暑者熱之深也治以清露飲加鮮荷梗綠豆衣以上首伏邪有本無標下入則有本有標內經云凡傷寒而成溫病者先夏至日為病溫後夏至日為病暑者是也有伏暑天之暑氣一動地之濕氣自騰其暑濕之氣亦從口鼻而入由母傳子伏於肺腎暑多於濕名曰伏暑至秋冬外感寒涼或受溫熱引動初夏伏暑必口渴溲紅舌白在氣舌赤在血治法見臨證指南溫病條辨其症與濕溫相別者口渴能飲身能轉側也有濕溫與伏暑來源同唯其人素偏於濕又受濕多於暑名曰濕溫必身重疼痛舌白不渴或水黃而滑脈細而濡胸痞不飢治當燥濕清熱吳鞠通化裁葉氏法立三仁湯最妥元按辨舌黃而滑者或清露飲加蘆根滑石舌白而滑者加蒼朮皮省頭草其症與伏暑分別者身重難轉舌滑不渴者又按伏暑濕溫二症秋重於夏冬重於秋至來春尤重於冬故東垣此事難知云邪之所藏淺者輕而易治深者其病重而難治尤深者其病死而不治以上濕熱暑邪仿此也有寒濕與濕溫來源同但濕居六七暑居三四者為濕溫暑居一二濕居八九者為寒濕伏暑宜清涼濕溫宜甘淡滲濕方中加辛溫之品寒濕不但辛溫可加即辛熱亦可加何者以偏於暑者多手太陰症肺金畏暑故宜清暑也偏於濕者多足太陰症脾土惡濕方先宜加溫燥濕氣使濕化口渴舌宣再更清涼可耳有時瘧微寒身熱口渴溲赤或但熱不寒狀如瘧疾即伏暑之輕者治以葉氏法不可用小柴胡湯要之內經瘧論溫瘧有伏風之文刺瘧有五臟六腑之理豈僅在少陽哉若果瘧來寒熱相均者此邪在少陽也仲景小柴胡湯不可不用徐氏靈胎未明時瘧在肺胃而批葉氏不遵仲聖相傳之小柴胡湯以為瘧疾不能出小柴胡湯範圍試問仲景金匱要略瘧門中溫瘧以白虎加桂枝湯牡瘧以蜀漆散反治牡蠣湯有柴胡引經云有時痢長夏肺受暑濕之氣由肺傳於大腸致為痢疾暑多色赤濕多色白先疑擬注河間原病式可考至所言伏邪為反瘧痢其法詳於臨證指南此上五伏邪當有標邪勾動者大約葉氏總內經夏傷於暑秋必痎瘧引伸而出況王孟英按喻氏云春夏之病當起於冬至秋冬二時之病當起於夏非其證訣時邪者有春邪冬不藏精腎水已虛本證傷寒無熱亦化至春應溫而寒其發升之氣被寒所遏則營分受邪必身熱惡寒無汗咳嗽治以葛氏蔥豉湯加減不可用麻黃桂枝青龍等方若春寒之氣乘虛由壬傳癸二三日後舌黃口渴脈變數者此寒已化熱也有汗宜清露飲無汗宜銀翹散加蔥白有風溫春氣大透草木甲拆則風溫之邪從口鼻而入先傷肺衛必身熱惡風咳嗽脈數治以清露飲加薄荷牛蒡子或銀翹散去芥穗豆豉有溫邪夏間陽氣盡泄則溫熱之邪從口鼻而入先犯肺衛必脈數身熱頭痛腰痛口燥治以清露飲不可用銀翹法以溫邪無風故為不宜用荊芥穗薄荷牛蒡子諸品元按傷寒中風與風溫溫熱本系當令之邪因時人但云風溫溫熱為時邪而不云傷寒中風為時邪故不入當令之邪而附於此有夏感夏宜熱而涼則暑為涼所遏非涼中全無暑熱也其邪傷於營分必發熱惡寒頭痛無汗身形拘急肢節疼痛蔣氏寶素診略所謂夏令感寒之症猶冬溫之理實發前人之未發由此以觀則局方大順散冷香飲子及藿香正氣散中散風寒之品居七八祛暑濕之品居二三昔賢將大順散列於暑症門中言此方乃舍時從症者陳修園之書可求也更有謂夏間陽暑多宜白虎湯六一散至於大順散乃治陰暑者百中難見一二不可妄投徐洄溪之書可考也二子所論皆本潔古靜而得之乘涼廣廈動而得之途中冒暑以元觀之絕不若夏感猶冬溫反悟之的當也其餘局方香薷飲蔣氏越蔭湯皆可酌症而用有秋邪秋宜涼而熱其秋收之氣欲斂不斂謂之秋行夏令則熱氣由口鼻而入先傷肺衛必身熱口渴有汗脈洪法以辛涼甘寒不可用辛溫燥熱有冬溫亦曰冬邪冬應寒而溫其冬藏之氣欲藏不藏謂之冬行春令則溫暖之氣由口鼻而入先犯肺胃必身熱有汗脈數口乾寸口脈獨大而無力治以清露飲去桔梗杏仁加沙參麥冬以葉案治冬溫謂不可用薄荷杏仁桔梗泄氣大約因冬陽不潛真氣已虛非春夏陽升之氣不虛可比故元仿此加減以上六時之邪皆有標無本經云冬能藏精春不病溫對面即是冬不藏精春必病溫故元於時邪首言冬不藏精四字以腎虛則諸邪易受不獨冬宜藏精也且吳鞠通云冬不藏精非專主房勞說即一切人事之能動搖其精者皆是可見嬰兒幼女亦有時邪之理也伏邪時邪而外更有當令之邪者曰傷寒冬令外受寒邪傷於膀胱無汗脈浮緊其症治之法詳仲景傷寒論曰中風春令外受風邪傷於太陽惡風有汗脈浮緩其症治之法亦詳仲景傷寒論曰中暍夏令外受暑邪從口鼻而入傷於肺胃必自汗惡寒身熱而渴脈象微弱其治暍之法詳仲景金匱要略元按伏邪暑病與中暍形症頗同唯暑病脈洪長中暍脈微弱有別耳曰中濕長夏土旺十八日溫濕邪與暑相混從口鼻而入暑多於濕則傷於肺金濕多於暑則傷脾土即暑濕濕溫隨受隨發之症也治見葉氏臨證指南曰秋燥立秋後天地不交則為否卦其天氣上升地氣下降大塊之中致為乾燥之氣從口鼻而入傷於肺經氣分必身熱鼻乾咳嗽口燥右脈數大治以喻氏清燥救肺湯及葉氏法至於吳鞠通之化裁宜去取可也以上五當令之邪皆有標無本內經所謂在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水是也秋燥從此悟出斯刻只論風溫溫熱冬溫今將伏邪時邪與當令之邪標本言明使學者知辨症在毫釐千里宜博覽群書精求義理勿貪一書之簡易孟浪施治也九治溫病要識寒極似熱熱極似寒虛極似實實極似虛四症方不亂言吉凶溫病熱從里發時邪熱由上受並非寒症也因過用涼劑李氏文榮仿寓意草云載陶云汀宮保被醫誤用苦寒傷胃一則唐方伯論大意云熱症用涼藥固然枯苗得雨宜雨澤以潤之不可冰雹以傷之今累用黃連石膏者冰雹是也元按若陽明少陰有實火又為白虎三黃之的症故元嘗語諸友曰雪水秋露及西瓜汁治肺胃之熱也蚌水蔗漿生地元參救腎陰之熱也諸品當則為時雨不當為冰雹不獨黃連石膏而已而傷命火致龍火不潛真陽外越面赤如妝口渴欲飲小溲黃色而清經以諸水澄清皆屬於寒諸水渾濁皆屬於熱今黃而清不渾非真熱也觀天寒水清天熱水渾及冷水澄清熱水渾濁則理自明見王九峰溲論唯脈象沉細或脈如數重按全無四肢厥冷手厥上臑足厥上膝鼻孔冷氣蔡氏熙和云肺氣喘促有似真熱但真熱鼻孔氣熱假熱鼻孔氣冷為異耳大便清利脾陽虛也此真寒而假熱也誤用白虎湯必死須以人參四逆湯加童便主之若能肢熱脈起則假熱形症不治自愈如天大雨則龍雷火起若雨散雲收陽光普照則龍火自潛又或溫病傳於中焦當下失下熱甚於內四肢厥冷時熱時止不上臑膝身反惡寒熱極反從寒化謂陽甚於內外反陽微也神昏不渴熱壅於胃或入於血皆令人不渴小溲白渾渾濁屬熱切勿以色白為寒唯大便不解胸腹滿痛舌黃而焦齒黑唇破脈沉實者此假寒而真熱也誤用姜附必危河間傷寒直格云病本熱甚熱蘊於裡則陽氣陷下以至厥逆身冷或青而脈微乃妄以寒極而急救其陽反遭其暴害也須以白虎湯合承氣湯下之若果便解脈數則假寒形症不治而為大渴大汗煩躁如狂諸症見矣如火爐然外雖冰冷中有熱炭未熄若火箸一撥則內伏之熱外騰又或溫病日久正傷致為脾腎雙虛按溫病初起或不知辛涼解肌而用辛溫發表不能外解轉致內熱或灼胃液甚至暗耗腎水否則涼藥太過以傷脾陽故纏綿日久而致正氣受傷矣身內反熱脈來細數但熱有時而衰脈重按無力口乾不欲飲舌赤有巢經云陰虛生內熱此虛極似實也誤用白虎三黃則身愈熱脈愈數以葉氏復脈湯合生脈散主之俟陰虧全復則虛熱自止此腎虛可復更有身熱已退舌上無胎無積滯也但胸痞不暢飲食不進胃陰虛胃陽虛皆能致不食胃脈弦大重按似有似無經云脾虛生脹滿亦虛極似實也誤用瀉心及消導之品致犯虛虛脾胃虛而用攻劑則中土愈虛之戒須以建中及復脈益胃等湯葉氏按仲景云元氣已傷而病不愈者當與甘藥則知理陽氣當推建中顧陰液須投復脈矣加減主之俟脾胃一健則飲食自進胸口反寬矣土虛則脹土實則愈此脾虛可復又或溫病身倦骨痛神迷安靜惡聞響聲唯脈沉數有力舌黃黑起刺便閉溲赤王冰所謂大實有羸狀此實極似虛也誤用參耆歸術補劑致犯實實之戒須用增液承氣湯主之如大便一行則反口渴煩躁甚則起床發狂經云心病則煩至煩躁可平矣以上四症關係甚重平素須細細辨明臨證自有真見故經曰謹熟陰陽無與眾謀又曰知逆與從正行無問此其道也經云心病則煩腎病則躁此陰陽交脫也若用參附回陽致犯燎原之戒須用三甲復脈及大定風珠諸品以挽之俟陽潛陰回龍雷安澤則陰津來復煩躁可平矣
