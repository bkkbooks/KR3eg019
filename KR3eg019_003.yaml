body:
  text: 卷下十治溫病要辨得表裡虛實寒熱六字明白然後用藥方不差誤均是惡寒也唯溫邪微寒溫病從口鼻而入客於肺衛而微寒者是肺金本寒也一二日後即單熱不寒矣微字溫熱著眼處身熱為表葉氏云邪在肺為表有汗惡風清露飲加薄荷牛蒡子無汗惡寒銀翹散加蔥白有汗出鼓慄河間原病式云病熱過甚則反出五液或為戰慄惡寒反兼水化制之也其為治者但當瀉其過甚之氣以為病本不可反誤治其兼化也葉氏云諸禁鼓慄皆屬於火則知戰慄乃極熱而反見寒象壯熱而渴者為熱白虎湯加減有微熱肢冷惡熱反欲近火但便閉溲赤此熱極反從寒化河間傷寒醫鑑云五行之道實甚則過熱反似克己者也是謂兼化如萬物熱極而反出水液以火鍊金熱極而反化為水是以火極而反以水化也為里為實大承氣湯合增液湯下之腑氣通則反肢熱煩渴症在上中二焦服寒涼攻伐太過好用寒涼之過反自汗惡寒嘔利肢冷脈沉舌潤者為虛陽虛附子理中湯加浮小麥均是發熱也溫邪頭痛寸脈洪身熱小溲赤為表有汗清露飲加減無汗銀翹散加蔥白有胸膈煩熱呼吸俱粗關尺右手洪數溲赤便通有熱無結為熱清心涼膈散有煩躁脈數胸脘拒按舌或黃或濁及腹痛便秘或熱極旁流為實小陷胸湯小承氣湯加減此治邪氣不逆傳心胞而順傳中下者若舌黃白相間與黃而光滑無根者不可用之詳溫熱論中又有熱久傷陰用清涼藥而身熱煩躁更甚用攻下藥而便反不解舌燥尤甚此大虛有盛候也陰虛三甲復脈湯若夜熱早涼熱退無汗者熱在陰分也宜青蒿鱉甲湯有勞復發熱因病新瘥津液未復血氣尚弱或語言傷氣思慮傷脾身熱隨至宜寡言屏慮勞復良劑清解餘熱為主生脈散加生地石斛煎水送下歸脾丸二錢有食復發熱因病衰脾胃未健驟進飲食此症舌必復黃難以消化其積滯復裹餘邪也章虛谷曰此言病初愈餘熱留藏於經絡血氣而未淨因食助氣則二熱相合而復熾故食肉病必復發多食谷則邪遺留必淹纏難愈故當解口清淡稀粥漸為調養也元按唐鑑云治病雖愈尤宜將護倘遽自放縱病復作則不可救矣宜扶正消導葉氏景岳發揮云因食而復熱宜消其食其熱自退不可謂溫病概禁消導兼清餘邪為主隨症酌量用方更有下後身涼數日而復發熱者餘邪復出也按時氣自復者少伏邪自復者多以伏邪如鳥棲巢如獸藏穴根本堅固匿於少陰一旦外感六淫引出內伏之邪若巢穴之外有聲響動致鳥不安於巢獸不伏於穴治伏邪者如射鳥於巢捕獸於穴須用良策方免傷人如服應症之藥而身熱已退諸恙漸平或逾數時或隔數日而熱尤甚症愈重者乃巢內尚有巨鳥穴中仍藏猛獸見捕射難以容身只得併力而出與正相鬥甚則猛復三五次者故伏邪較時邪為難治之有一日用辛涼二日增煩躁二日用甘寒三日增神糊三日用鹹寒四日增舌黑正是愈投涼藥則愈增熱病若非伏邪外達焉有用寒涼之劑存陰輔正不見寒症反增熱症者其時宜將內伏之邪與正氣相較如正勝於邪則用清營湯紫雪輩則邪解正復自然脈靜身涼若邪勝於正則漸漸神昏內閉即難治矣又按伏邪痧疹無論大人嬰兒雖用對症之方而餘氣未盡者則必時熱時止夜寐不安精神不振胃氣不醒醫者當審來源未用清涼藥之先預言服藥後必壯熱口渴甚則神糊譫妄皆系伏邪外透免致驚慌均是寒熱往來也溫邪必熱多寒少溫病手太陰受邪也非足少陽受邪寒熱相平可比觀易雷天大壯陽畫多陰畫少即熱多寒少之理地天泰陰畫與陽畫相等即寒熱相平之理若誤認肺經症作膽經症則雷天大壯不幾為地天泰乎較之傷寒寒熱不均平也比之瘧疾又不分明瘧疾休作有時溫熱休作無時由無時而轉有時是邪轉瘧也由有時而轉無時是瘧化邪也自寒少熱多而為壯熱神昏者重由神昏壯熱而為身熱微寒者輕初起兼頭痛無汗者為表銀翹散加減兼大腹痛脹便結者為里小承氣湯加減若泥於傷寒者必議大柴胡湯矣有汗下後脈虛心悸神倦自汗內熱陰虛形寒陽虛者為虛炙甘草湯去參姜加柏子仁左牡蠣淮小麥夜交藤均是頭痛也溫邪必自覺熱蒸昏悶風寒諸痛不昏悶身熱微寒頭痛者為表銀翹散加減有煩渴自汗脈數頭痛者為熱白虎湯兼嘔者竹葉石膏湯有舌黃身熟日晡時甚腹滿便閉頭痛者為里涼膈散加減有汗下後神倦自汗脈虛頭痛時來時止者為虛知柏地黃湯加浮麥黃耆均是自汗也河間傷寒直格云怫然痞閉無汗者故當病也其汗泄通泰而亦病者蓋泰極則否也夫人氣和而為汗如天地氣和而為雨過多則澇矣溫邪熱蒸而自汗不可以表虛論也頭眩有汗惡風初起惡風有汗又不可拘溫邪無表虛者為表清露飲加減有舌黃煩渴有汗便通者為熱天水散加味有胸痞腹滿拒按四肢徹然汗出者為實小陷胸湯加味小承氣湯加減有邪退正虛舌赤不渴二便清利自汗者為虛吳氏救逆湯有熱極汗多致陽隨汗泄而暫肢冷脈沉者為虛先宜參附湯按溫病熱極汗出不止而肢厥惡寒脈遲者此陽氣隨汗而泄宜速回陽陽回熱必復熾當更救陰之法戰汗者亦然若服涼藥過甚而傷真火必汗出而冷肢厥脈沉者此真陽飛越急當回陽陽回熱不復熾宜用陰陽雙攝之法但二疾回陽之後一復熱一不復熱所謂生死在須臾緩則不可救矣解見回溪醫案均是戰汗也河間傷寒直格云正氣與邪氣並之於里表氣虛而裡熱實亢則害承乃制故里之大熱極甚而反兼寒水之化制之故病熱極而反寒戰也諸戰皆然吳又可云熱病大汗將出而反寒戰者如鳥之將飛其身必伏先縱足而後揚翅方得升舉溫邪以戰汗為佳兆以戰則邪正相爭汗則正逐邪出經云人之汗生於穀穀生於精今汗出熱退是邪卻而精勝也葉氏云溫邪始終在氣分流連可冀其戰汗透邪今邪與汗並熱達腠開邪從汗出矣透則脈靜身涼汗透脈靜者吉脈躁者凶腹無阻滯大便已解可知否則餘邪未盡而復熱經云精勝則能食而不復熱復熱者邪氣也則有再作戰汗而解者前戰汗者譬之大敵已退復後戰汗者如敵隱伏山林叢雜之中見大隊已敗難以伏藏只得出而相戰若有汗而熱復退是正又勝邪矣有戰汗須三四次而解者此邪實正強難分勝負也有戰一次不能再戰正不勝邪待酌下法而退者此敵來甚銳我軍寡雖勝眾免強決戰必俟援兵以敗之未嘗不助我以退敵也有虛人或邪踞已久忽戰汗後即加沉昏珠汗而脫者如敵攻孤城內無糧草外無援兵勉強而戰而城不為敵敗者鮮矣凡戰汗之時多與熱湯助其作汗如敵漸漸欲潰吾軍加以飽餐取以飽勝飢之法戰汗之時脈多停止汗後自見戰時邪正混為一團陰陽不分氣血相亂故脈多停止總之戰汗後神靜者吉正勝昏躁者危邪勝也均是狂汗也作汗似發狂發狂似作汗宜細辨溫邪服辛涼藥後忽手舞足蹈踏床投榻遂大汗淋漓熱退脈靜者安如敵來已久見吾軍強壯未敢相爭暨久糧餉日虛勉力與正相爭則為正所敗故大汗後而熱自退脈自靜也河間傷寒直格云作汗之病熱者乃陽熱怫靜而否極復泰即熱氣熏蒸而為汗出也如天時陽熱亢旱否極而泰則復為雨矣故欲雨則天乃鬱熱晴霽則天反清涼人涼則病愈矣劉松峰述古云陽亢則水虧陰衰則火盛水涸於經安得作汗譬之乾鍋赤裂潤自何來但加以水則鬱蒸沛然而熱氣上騰汗之水生亦復如是用涼藥以救水水生而汗有不出者乎如症同上而發狂或登高而歌棄衣而走有汗而熱如故者危彼此相戰有自潰之勢二者臨時作汗發狂欲見之時何別以作汗之脈數而緩緩則胃氣和發狂之脈數而大也大則病進元按戰汗狂汗兩條伏邪最多時邪甚少均是發黃也溫邪渴未甚腹不滿無汗溲短心中懊憹發黃者為熱梔子柏皮湯加減有頭汗出渴欲飲水腹滿舌黃溲閉發黃者為實茵陳蒿湯加減有身面悉黃少腹滿腸鳴溲少者為蓄水四苓合六乙散加茵陳車前草有少腹軟痛溲長便黑黃者為蓄血桃仁承氣湯去桂枝加茵陳丹皮元按吳氏風溫溫熱門載發黃二條竊思發黃之症一則曰溲短再則曰溲閉既短且閉顯然熱為濕鬱發於皮外果然單為濕病皮膚未必見黃況葉案風溫溫熱門並未載發黃之症可見此症宜入濕溫之門用述鄙意以質明哲均是癮疹也疹屬太陰風熱溫邪初在太陰不可發汗若誤汗誤用辛溫汗劑而汗反不出發疹者為表銀翹散去豆豉加生地丹皮元參大青葉有煩渴舌黃便閉發疹不快者為里玉女煎加硝黃下之有元氣不足而得溫病涼劑過甚逼龍雷之火熏爍脾肺而發陰疹者色必淡紅手足多而胸背少脈沉細不洪者為陽虛附子理中湯加減均是發癍也癍屬陽明營熱溫邪從經脈有外解之機亦佳兆也如身熱無汗誤表而汗不出為隱癍者為表銀翹散加減有身熱譫語而隱癍者為里犀角地黃湯葉氏云煩躁大便不通加金汁老年或平素有寒者以人中黃代之有壯熱舌灰神糊便實而隱癍者為實白虎化癍湯加丹皮赤芍黃芩芒硝大黃有癍出而裡熱不解者為胃津亡也主以甘寒法重者以玉女煎輕者以梨皮蔗漿若其人腎水未虧邪雖未及下焦宜加鹹寒如元參知母阿膠龜板之類以安未受邪之地內經所謂治其未病也至於陰癍治法見前疹病夫雜病以癍消則愈溫熱以里清為要溫病與疫不同無論表裡切不可用吳氏舉癍湯引邪內陷而神糊矣故每見癍透數日而譫語神昏如昔必待裡熱全清二便清利方為愈期也若欲細辨色赤色紫色黑吉凶宜看葉氏法見三家醫案濕熱論小注中均是煩躁也煩為心神不安躁為揚手擲足皆鬱熱所致熱淺則為煩躁熱深則為沉昏煩躁轉沉昏自輕至重沉昏變煩躁自重化輕如初起惡風身熱煩躁者為表清露飲加減有壯熱口渴舌黃而煩躁者為熱白虎湯加連翹花粉若四邊紅中心或黃或白而乾者宜涼膈散有胸痞滿或腹實痛而煩躁者為實黃連瀉心湯小承氣湯有汗下後真陰欲竭壯火復熾心煩不得臥者為虛黃連阿膠湯有舌黑煩躁漸近神昏者為欲內閉清宮湯加減牛黃清心丸均是嘔吐也溫邪胃熱者多河間云嘔者火氣炎上之象也故胃熱甚則嘔也如身熱頭眩而嘔者為表清露飲加枇杷葉不可用二陳湯有煩渴脈數而吐酸經云諸嘔吐酸皆屬於熱河間云吐酸肝木之味也由火實制金不能平木肝木自甚故為酸也葉氏景岳發揮云天氣熱雖在釜中亦能酸臭天氣寒焉有酸臭之理由此觀之則知熱極而酸無疑矣又譬之以飯造酒蓋暖則成酒熱極則酸元按酸而溫者為熱酸而冷者為寒然溫邪屬熱者多屬寒者亦不可不知者為熱竹葉石膏湯有心下臍上滿痛拒按而嘔者為實小陷胸合調胃承氣湯加減有汗下後心悸神虛多汗舌赤聞響聲而嘔者為虛陰虛復脈湯加玉竹枇杷葉有清涼太過肢冷溲清自利而嘔者為虛附子理中湯加減更有濕溫另有治法詳溫熱贅言溫病條辨嘔吐不止晝夜不差欲死者為胃移熱於肺肺不受邪還歸於胃也如天晴已久陽氣自旺一旦地之雲氣上於天則陽剛不受復降於地聞吾邑某姓得嘔吐症醫投生薑半夏其嘔尤甚更逢平肝和胃之法仍然不止遂請邑東王明經先生至用黃連四分蘇葉三分煎服一時許嘔吐陡止元因悟寄瓢子之方二味用如許之少者蓋遵溫病首先犯肺故治上不犯中而效如影響然王氏好奇也均是口渴也溫邪口渴者多但一入血分則口反不渴熱結下焦口亦不渴逆傳入心胞神昏舌黑口亦不渴不可謂不渴非熱症也至於濕溫初起濕踞於中州胸痞不飢熱未勝濕雖目赤溲赤口俱不渴臨證者宜不論舌苔黃白總以滑潤不燥為別如身熱惡風而渴者為表清露飲加花粉麥冬有煩躁大渴飲冷舌黃者為熱白虎湯加減甚則以冰水頻飲有熱痰者雪梨漿沃之有壯熱口渴胸臍腹痛硬手不可近者為實小陷胸大承氣加減有尺數少腹滿口渴溲赤痛而短者為蓄水豬苓湯導赤散六乙散有時欲漱口不欲咽大便黑而易者為瘀血犀角地黃湯有汗下後心悸者尺脈如數如數者非真數也見薛生白先生原著注中口渴者為虛此津液少也生脈散加麥冬合五汁飲主之凡溫熱渴甚則熱甚渴飲則熱散在末路以渴為有餘邪不渴為無餘邪此係要訣不可不知也均是咳嗽也溫邪初起熱在肺衛身熱咳嗽微惡風寒者為表有汗者清露飲加減無汗者銀翹散加減不可用蘇杏二陳湯及六安煎加防風白芷辛溫之品有身熱舌黃口渴有汗咳嗽有痰者為熱瀉白散加前胡牛蒡薄荷有咳嗽痰多煩躁腹滿便閉脈數者為實三承氣湯加連翹杏仁象貝瓜蔞有汗下後陰液來復虛火無制而灼肺金致咳嗽面赤甚或喘促脈象細數舌赤有巢為陰虛三甲復脈加天冬杏仁有清涼太過則龍火不潛而上灼於肺致面赤如妝咳嗽痰沫脈象虛數重按若無四肢微厥者為陽虛金匱腎氣丸加減均是喘促也溫邪初起熱在肺衛身熱惡風有汗而喘者為表銀翹散加桑白皮苦杏仁有壯熱口渴舌黃脈數而喘者為熱葦莖湯加桑白皮川貝母有熱邪郁肺右寸實大咳逆喘急聲音不出甚則不得臥者為肺實葶藶大棗合葦莖湯瀉白散加減有煩滿腹脹大便秘結胃脈數滑而喘促者為胃實三承氣湯加杏仁桑白皮唯誤發其表難治有誤表劫津致傷腎陰陰傷則陽無所斂故少納氣乏力以致喘促汗多脈數無力者為虛汗多肢溫陰虛也三才復脈等湯加減汗多肢冷陽虛也參附湯加味均是吐血也溫邪熱傷肺胃身熱咳嗽吐血者為表清露飲加山枝梔皮梨汁有壯熱口渴舌黃脈數而失血者為熱犀角地黃湯竹葉玉女煎加減有吐血紫塊少腹痛或脅痛者此乃溫熱由肺衛而引動宿血也應症方中加丹皮赤芍桃仁大黃黃芩按此症在三四日引動者可治十餘日引動者難治有清利太過龍火上越致顴赤如妝脈數無力重按似無口渴不飲而失血者為陽虛人參四逆湯加童便均是耳聾也溫邪之熱易傷腎陰腎開竅於耳非傷寒少陽經耳聾可比葉案云溫熱熏蒸之氣上迫清竅耳為失聰不與少陽耳聾同例元按傷寒有胸脅滿而口苦寒熱脈弦今溫邪只口渴煩躁神昏脈躁溲赤也若誤用小柴胡湯升陽則陰耗所謂以少陽藥治少陰也宜陳修園謂有病之經絡未蒙其救無病之經絡徒受其殃耳初起二三日身熱惡風而耳聾者為表清露飲加生地荷葉身熱腹痛便閉脈實而耳聾者為實增液承氣湯加荷葉不可用菖蒲治耳聾反引邪入心胞也有神昏譫語舌黑溲赤而耳聾者為欲內閉紫雪丹牛黃丸以石菖蒲鮮荷葉煎水下有汗下後神倦盜汗脈虛舌紅而耳聾者為虛不可急治以甘潤為主三甲復脈湯加鮮石斛或石菖蒲待粥食如常二便調勻始由漸而全更有症久虛極致神昏肢厥舌蹇不言循衣摸床面額珠汗而耳聾者為津脫不治溫邪無論始終皆以耳聾為最忌因耳聾顯系少陰腎水被熱邪劫灼故初起方中宜刻刻保陰若內閉心臟或病後虛甚者終歸無濟均是舌鑑也溫邪舌白而燥症在肺衛傷寒舌白不燥不滑必惡寒無汗脈緊濕溫舌白而滑身重不渴脈濡溫邪舌白而燥口渴溲赤脈數三者同中有異拘於傷寒感冒者又欲議麻黃桂枝及沖和湯矣已見少陰水虧也辛涼方中宜加育陰之品有苔黃而干舌苔不論黃黑以干為津液受傷口渴便秘者為里涼膈散加減有神昏肢厥舌灰黑而燥者為欲閉清宮湯加減另服紫雪丹有舌黑無津中生芒刺神糊脈數大便不解者為實犀角地黃湯加枳實大黃芒硝先以梨汁和蚌水服之有舌苔微黃身熱用攻下藥則身愈熱舌愈燥及心悸腰痛扁鵲所謂損不足也為虛三甲復脈湯生脈散加減更有苔赤帶紫而燥神糊譫語渴飲者為熱在胞絡也白虎湯加犀角羚羊生地金汁有病瘥後虛熱盜汗舌鮮紅而燥脈細數無力者陰虛也炙甘草湯加元參石斛龜板不可用寒涼藥有病瘥後惡寒有汗舌黑而潤不渴不熱脈沉細者為陽虛也金匱腎氣湯加減總之舌上無胎苔則胃無津可清潤不可攻下此要訣也觀舌辨症溫熱論最詳均是舌強卷短也溫邪舌強無表無表者無肺衛形症也有身熱舌謇肢冷無厥邪入心胞者為熱舌為心苗牛黃丸清宮湯加減有舌黃胸腹滿痛舌強便閉者為里三承氣湯加減有誤表劫津心中震震舌強神昏者為虛大劑復脈湯加減或阿膠雞子黃湯加麥冬以汗下後舌強與舌痿同治按舌痿軟而枯小虛脫之症死不治更有舌黑生刺變為卷短失下症也為實此火極似水宜大承氣加育陰之品急下之以上諸症兼痿者應用方中加川貝杏仁栝蔞竹茹甚則加礞石滾痰丸宜參濕溫法均是懊憹也溫邪二三日舌微黃王孟英云舌苔薄而清者邪未膠結可吐散舌苔厚而有根濁邪瘀結須重用辛開苦降如吐之邪結不得出反使氣逆而變他證寸脈盛心煩懊憹欲嘔起臥不安者為熱宜湧而越之梔子豉湯加減有二三日心煩不安痰涎壅塞胸痞而欲嘔者為痰熱亦宜吐之瓜蒂散虛者或加參姜有下後虛煩不眠心中懊憹反復顛倒者宜量虛實治之梔子豉湯少氣者加甘草嘔者加姜皮實者加大黃均是胸滿也膈間氣塞滿悶溫邪胸滿不痛邪尚未結也為痞黃連瀉心湯加減胸滿痛者邪氣已結也為結胸按而始痛者小陷胸湯不按而自痛者大陷胸湯兼痰牽引串痛而嘔加川貝杏仁枇杷葉兼食必硬痛或塊拒按加枳實焦楂麥芽兼血不拒按按之軟不硬脈必芤澀加蒲黃五靈脂赤芍丹皮有屢攻下而胸滿痛者乃脾土虛弱肝氣上逆也為虛脾虛小建中去飴糖加甘蔗水均是脅滿痛也脅肋下氣塞滿而痛溫邪脅滿痛在左者屬血肝居左且藏血宜應症方中加延胡歸尾桃仁五靈脂在右者屬氣肺在右且主氣於對症方中加青皮大腹皮又有在右屬痰者加白芥子杏仁甚者則加大戟芫花大抵痰氣無常時有聚散非比在血有聚無散也欲知在右痰與氣之分觀氣散余無所苦痰散仍有所苦可知有汗下清利後而脅滿痛者為虛氣虛兼嘔者宜養氣或血虛兼時熱者宜養血元按脅滿痛較胸滿痛難治以胸者譬之要道不得久塞脅者譬之僻巷塞則難開也均是腹滿痛也宿食邪結也多氣血痰水者少溫邪滿而不痛者乃水穀散漫未結為邪在氣分也於對症方中加大腹皮青皮山楂穀芽枳殼若兼舌黃脈實者為邪已傳胃小承氣湯加減亦有痛而不滿者乃水穀燥結為邪在血分也不受按而硬者宜下之調胃承氣湯有滿痛俱作拒按者宜急下之大承氣湯加減或更兼下稀黑水此熱極旁流也同上法大承氣湯虛者新加黃龍湯有滿痛喜溫不喜按反肢冷脈遲舌潤不濁此因服苦寒太過而傷脾胃之陽宜溫下之千金溫脾湯附子湯加硝黃均是少腹滿痛也溫邪滿而不痛為濕勝兼溫氣滯也於對症方中加青皮六一散有痛而不滿者為熱傷肝經血分也於對症方中加黃芩赤芍歸尾有滿痛俱作小便不利者蓄水也四苓合益元散有少腹滿痛而大便不通者為燥屎也三承氣湯加減有少腹堅滿小便利而大便黑如漆者為蓄血也桃仁承氣湯甚則抵當湯更有滿而不痛痛而不滿喜溫喜燥此由清下太過為虛也金匱腎氣湯加減均是自利也自利者不經攻下而自然泄瀉溫邪由肺胃傳大腸是熱極旁流也熱泄臍下熱口渴舌黃脈數溲赤所泄稀水色黃黑而臭寒泄臍下寒口不渴舌白滑腹痛脈遲溲清畏寒所泄稀水色清白而無味初起頭眩身熱而自利者為表清露飲合雞蘇散有身熱舌黃譫語自利完穀者邪熱不殺穀詳河間原病式為實仲景云下利譫語者有燥屎也小承氣湯加減有腹滿無塊時作腸鳴小溲短而大便自利者為蓄水豬苓湯合六一散加白通草有清下太過胸滿不餓脈遲溲清而下利清穀者為虛六君子湯加熟地炭炮薑炭或桃花粥主之或清下後但大便溏甚一日三四行脈仍數者宜吳氏一甲煎法均是大便不通也溫邪上三日身熱惡寒大便雖結未可下也下之必使結胸有煩渴譫語舌黃黑腹微痛者為里涼膈散加減有熱久耗劫津液燥結難下脈數無力神虛舌乾不下則結糞不通下之恐元氣不繼以補中寓泄法酌用陶氏黃龍湯或先投承氣湯以攻邪次進復脈湯加人參以補正但補劑須要用得不早不晏自然有利無害若補速則攻者不攻補緩則補者不補吾輩宜慎之有六七日大便不解者其人素有陰虧遺精必舌赤有巢腰間疼痛為實中有虛增液湯加芒硝煎水送下麻仁丸三錢不下再加大黃有大便已解越三四日而發熱為餘邪復結仲景云其後發熱者必大便復硬而少也宜與增液潤下法增液湯不下轉矢氣再合調謂承氣法此從仲景少與小承氣湯探轉矢氣而知可攻之之意套出有大便解而未暢日期又多見出神虛懶言煩躁不寐時而冷汗欲脫者為虛中有實當先扶正然後緩下之炙甘草湯加當歸夜交藤左牡蠣浮小麥俟虛汗已止神虛漸振再於方中加麻仁丸不下再加蔞貝慎不可另用硝黃按丹溪格致餘論云凡言治國者多借醫為喻仁者斯言也真氣民也病邪盜賊也或有盜賊勢須剪除而後已良相良將必須審度兵餉之虛實與時勢之可否然後動之涉輕妄則吾民先困於盜次困於兵民困而國弱矣有陽明胃實而用承氣則燥屎已至廣腸因肛門如錢燥屎如拳難以再攻者或有胃虛腸燥大便雖結而不可攻者宜用外治法仲景蜜煎導豬膽汁方酌用有汗多傷津液即煩而大便硬若本小便日三四行今日再行者不可攻之以大便不久自下也仲景云小便數少津液復還胃中故知不久必大便也均是小便不利也溫邪頭眩身熱而小便短者為表清露飲加赤苓豬苓有煩渴脈洪而小便不利者為熱吳氏冬地三黃湯加減有煩躁譫語脈實二便不通者為實先通大便燥糞一解則小溲自行勿用利品有汗下後唯小便不利者陰不足也腎司二便腎陰虛故小便難為虛炙甘草湯加龜板不可用五苓八正輩均是溲色也溫邪由黃而赤自表入里由赤而黑熱入血分蓄血則黑初起身熱咳嗽惡風溲赤者為表清露飲加減有壯熱煩躁肢厥熱厥便秘溲赤者為里白虎湯加大黃枳實有少腹滿煩渴囈語而小溲黑者為熱與蓄血犀角地黃湯加大黃桃仁澤蘭有汗下清涼太過表裡無邪但腹痛泄瀉小溲黃而不濁不熱者為脾腎虛附子理中湯或加熟地炭均是齒燥也溫邪由肺傳胃致身熱舌乾口渴齒燥者為熱白虎湯加生地有壯熱口渴不飲齒燥如煤便閉溲短者為實大承氣湯加犀角生地有汗下後時熱時止咽乾起燥齒黑少津者此腎水漸涸虛火煎熬也為陰虛三才湯加減有清利後真元受傷不能生脾土致腹痛便溏小溲清暢齒黑而潤脈沉遲者為陽虛附子理中湯加減均是遺尿也溫邪煩躁神糊譫語而遺尿者為熱白虎湯合導赤散有內閉及虛甚而遺尿者為不治均是譫語也熱蒸心胞溫邪脈洪身熱而譫語者屬經肺心胞二經熱由肺傳胞尚未離肺兼表清露飲加麥冬益元散有身熱大汗大渴脈洪而譫語舌黃者為胃熱白虎湯加連心連翹連心麥冬切不可用菖蒲鬱金犀角引邪入內有腹痛拒按舌黃黑生刺脈實大而譫語者為胃實仲景云胃中燥大便必硬硬則譫語也犀角地黃合調胃承氣湯加減以雪水煎之有身熱不渴舌黑無津譫語脈數者為欲閉無津者火極也色黑者水虧也復陰為主宜治犀角地黃湯清營湯加減兼服牛黃清心丸至寶丹有汗下後二便清利胸腹無阻六脈虛數而譫語者乃陰陽雙虛神無所依心為嬰兒腎為奼女脾為黃婆今汗下後而譫語者必惡響聲臥不安序是黃婆不媒嬰奼而心腎失既濟之權宜用媒合黃婆以交嬰奼法誤用犀角黃連及開竅諸品必危為虛心虛者必心悸不寐開目閉目自覺見鬼見神宜復脈湯加人參真金箔煎水送天王補心丹三錢脾虛者必面色痿黃四肢倦怠不欲飲食宜復脈湯煎送歸脾丸三錢腎虛者必耳聾不寐舌有紅巢宜復脈湯加元武版左牡蠣煎湯送磁朱丸二三錢按溫病諸書從無神虛譫語條列元歷症以來唯溫病最多每見清下後而見斯症者即以此方加味投之其效甚速故錄之以質高明更有少腹痛大便黑脈澀而譫語者為蓄血桃仁承氣去桂枝加丹皮丹參澤蘭別有濕溫心胸痛拒按脈弦滑痰涎搏結其熱而譫語者乃濕化痰熱而蒸心胞為痰熱白虎合小陷胸加蘆根滑石竹茹若大便閉者或酌加礞石滾痰丸此舉濕溫一條以明與上諸法微有不同施治亦異故醫者貴乎同中求異異中求同耳均是沉昏也沉昏者熱入心臟也當心胞傳心臟之時言語多妄然後之猶省人事也至於入心臟則全不省人事而沉昏矣溫邪戰汗後未能脈靜身涼亦不譫語而即沉昏者此因平素體虧經戰汗而邪內陷三甲復脈湯加人參不可用開竅法有邪在心胞失治而傳心臟者必舌黑燥齒焦鼻煤目赤神昏反不渴飲循衣摸床手指蠕動謂之內閉宜芳香開竅以希萬一犀角地黃湯加羚羊角真川連另服紫雪丹或服牛黃五分少則無益有應下失下邪氣上蒸心胞由譫語以至沉昏者必腹痛拒按苔黃黑脈沉有力是為胃實大承氣湯加犀角羚羊角另服牛黃清心丸有汗下後表裡無熱胸腹無阻二便自利忽神清由倦而漸昏由昏而漸沉為大虛危候急扶陰陽恐不逮矣復脈湯加揀人參三錢大抵沉昏三病無論虛實均是凶多吉少須預防之均是痙厥也溫邪七八日神昏舌短煩躁脈數而痙厥者為欲閉牛黃清心丸有痰糊譫語舌灰脈數臍腹脹痛而痙厥者為里犀角地黃合承氣湯加羚羊角鮮竹瀝有熱邪深入下焦脈細而勁者舌赤而干且噦逆而痙厥者為虛小定風珠方有熱邪久羈吸爍真陰陰虛舌絳且水不涵木脈虛弱而熱厥兼痙者為陰虛之極大定風珠方均是循衣摸床兩手撮空也溫邪煩躁舌赤口渴而摸床者為熱甚則四肢實白虎湯加生地黃連有煩躁舌黃便閉而摸床者為有熱有結也涼膈散加減有當下失下以致神昏舌黑而摸床撮空者為邪氣內閉先服紫雪丹如能神氣稍清然後服牛黃承氣湯否則不治均是便血也熱傷陰經溫邪初起身熱口渴惡風而便鮮紅血者為表清露飲加牛蒡子薄荷黃芩地榆有壯熱熱極煩渴譫語而便血者為裡熱犀角地黃湯加赤芍山梔有少腹欲痛血色紫黯者此因新邪觸動宿恙桃仁承氣去桂枝加歸尾赤芍丹皮地榆有邪熱已撤下焦虛寒寒則陰血凝滯氣不能統脈反濡小而或便膿血者為裡虛桃花湯主之均是囊縮也熱入肝經溫邪心煩溲赤少腹滿不拒按而囊縮者為有熱無結導赤散加丹皮宣木瓜有少腹滿而硬痛溲赤便閉而囊縮者為有熱有結桃仁承氣湯加減俟便解熱退則囊自縱矣夫囊縮時身冷脈沉厥逆與中寒同但中寒陰莖萎縮甚如婦人溫邪陰莖如常彼此各異均是身冷也溫邪失下致譫語舌燥腹滿便秘而身反冷脈微者此熱厥也不可急下河間傷寒醫鑑云如失下熱極以致身冷脈微而昏冒將死若急下之則殘陰暴絕陽氣後竭而立死宜涼膈散或黃連解毒湯養陰退陽但得蓄熱漸漸宣散則心胸復暖脈漸漸生脈復有力可以三一承氣湯微下之有用辛溫之劑汗反不出而熱轉入骨外反身冷者仲景所謂寒在皮膚熱在骨髓也昔集驗方中載一人身蓋數被而仍寒冷醫知因時邪熱伏陽極似陰以石膏一斤煎透與服一二碗而揭被一床五六碗而數被皆去再服則身壯熱淋漓大汗口渴脈數後汗透脈靜身涼而安若誤用桂附熱藥必然不救有服寒涼藥太過真陽幾息肢厥身冷脈沉微者此陽虛也四逆湯加味有戰汗後懶言語身膚冷者不可頻頻呼喚一晝夜自然轉溫若身冷而汗如珠如油又為脫症不治二者何別以轉溫之脈安靜脫症之脈躁甚也詳葉氏溫熱論均是呃逆也溫邪熱結者多非雜症有寒熱虛實之別若邪熱結聚上焦致譫語舌黑津液乾燥而呃者宜養津液為主蚌水和梨汁救之敝邑沙氏石安屢用之法有臍腹痛硬便閉而呃者宜下之增液承氣湯加減有下後病久神氣漸糊汗冷舌卷而呃者為欲脫參附湯加味溫之大抵呃症世有喜用丁香柿蒂散及旋覆代赭石湯豈知一為胃寒而設一為下復胃虛而用絕非溫病所宜用者均是吐蛔也溫邪胃熱者多非傷寒寒熱相雜宜於表裡應症方中加烏梅黃連以安之切不可用川椒乾薑及使君雷丸辛熱之品均是熱入血室也溫邪熱症如婦女經水適斷而受溫邪以致脈數耳聾乾嘔煩渴數日不解邪焰發痙者為熱竹葉玉女煎有經水適來因邪熱陷入致為譫妄如狂心煩飲冷脈沉腹痛者為實葉氏加減桃仁承氣湯有經期未至被溫邪逼入血室而經行未曾蓄聚致神去八九右脈虛數暮微寒熱者為虛復脈湯加人參均是胎前也溫邪最易傷胎如赤地千里亢旱已極而樹中之果草上之蓏未有不枯敗而墜落者至於表裡治法俱同男子若腹痛便閉譫語脈實宜承氣湯加減不可謂有胎而忌用硝黃劉松峰云女子胎孕古有懸鐘之喻梁腐而鍾未有不落者此症此時大黃逐邪正所以保胎也但拘於芩術為保胎之聖藥觀有故無損亦無殞也玩薛氏醫經原旨注中則知此理矣均是產後也雜病產後慎用苦寒唯溫邪不然至於表裡治同男子如壯熱神昏渴飲脈數宜用犀角石膏甘寒之品切不可以連翹麥冬代之徐靈胎云產後臟腑如焚經脈如沸是也觀仲景金匱產後有竹皮大丸則知用甘寒之道大抵產後如無糧之師利於速戰傳云兵猶火也不戰將自焚不可拘於產後只宜溫補也十一治諸病不驗宜乎反求諸已醫者首貴識症然後議方如作文先明題目然後下筆從來得題竅者不唯文佳且知後世能傳與否而得症旨者豈有不知方之中病與不中病耶大醫至病家於望聞問切得其病原當時對病家言明此症是表是里是虛是實是寒是熱是易治是難治是緩治是急治是失治是不治然後議方詳言服方後效則衰何病不效則加何病或明日不效亦不增病者大症如江海之舟不進便是退機甚至所用之方不效明日須更高明者知之為知之不知為不知老子所謂虛其心實其腹經書所謂滿招損謙受益是也徐氏所謂命中也如所言符合則仍須謹慎所言不驗則復從四診細察是何處認錯不錯則驗不驗則錯若自不認錯直是大錯未有不了如指掌者古云為醫者無諂上交無諂無驕下交不瀆無高亢亢龍有悔無勢利小人之態可見學問之途如泡茶然初則色濃其味厚若後不添茶葉而欲不至於清水者安得乎況易不恆其往或承之羞謂醫者能寄死生不可無恆心也十二治溫病要知正面察死對面知生總訣頭上𨷂者死項筋舒展者死面赤脈沉細者死大顴發赤噦者死白如擦殘汗粉者死面黑皮毛焦枯者死天庭黑者死顴與髮際鼻梁黑者死耳目口鼻黑色起者死面無精彩不受飲食者死目直視喘滿下痢者死黑氣生魚尾輦入太陽者死睛建不轉者死目無精彩牙齒黑者死目精恍惚者死目眶陷者死目直視肩垂者死目不開熱不已者死鼻如扇張者死唇白舌卷囊縮者死唇吻焦者死唇青體冷遺尿者死唇口黑者死唇青人中平滿者死唇縮氣喘者死唇反舌萎者死口張氣直出者死口張脈絕者死口目顫搖不止者死口燥齒乾形脫者死齒黑而枯者死齒長垢發枯者死津脫耳聾者死耳聾笑狂者死兩耳枯者死耳輪枯薄而青而白而黑為腎敗主死舌黑生刺刮去底色紅生黑死刮去又生者死舌枯萎者死舌爛熱不已者死舌短硬者死齧舌者死餂舌者死汗出不流舌卷者死兩手撮空者死數指者死指甲白者死手足指甲肉黑者死爪枯毛折者死足難屈伸者死不能久立者死溫病虛甚者死髓熱者死熱而痙者死譫語肢短者死身體不仁者死不能轉搖者死四末不收者死身熱喘急者死屍臭及語死者死體重尿不止者死大肉陷下者死大骨枯槁者死婦人乳縮者死臥床遺尿不覺者死形肥脈細少氣者死形瘦脈大多氣者死背曲肩垂者死毛孔生灰者死病人不許治者死腹脹少氣者死泄而腹滿甚者死陽明太實土剋水者死老人嬰兒熱而腹滿者死口張心絕者死眼合肝絕者死手撮脾絕者死聲如鼾肺絕者死目盲遺尿腎絕者死眉傾膽絕者死腰重脊痛難轉胃絕者死髮直如麻汗出不止小腸絕者死泄痢不休大腸絕者死指甲青或脫落呼罵不止筋絕者死齒落脈浮無根骨絕者死舌腫腳腫便赤溺血肉絕者死青如草色者死黃如枳實者死赤如衃血者死白如枯骨者死黑如煙煤者死青如藍者死黃如土者死赤如赭者死白如鹽者死黑如地蒼漆柴者死眉發豎起者死汗出脈躁者死汗出發潤喘甚者死汗出如油者死汗出如珠者死汗不出嘔下血者死咳而衄汗不出出不至足者死肉盡脫者死火躁欲入水者死吐血不止者死呃逆珠汗者死氣少不語者死泄瀉不止者死乍靜乍亂者死循衣摸床者死掣衣撮空者死喘氣不便者死陰脫者目盲陽脫者見鬼聲如拽鋸者死失言不能言語者死聲喑不出寒厥不回二便閉不通者死呼吸動搖者死病在上焦吸促病在下焦吸遲皆難治病在中焦吸數當下之虛者死舌下脈青舌及身冷子死面青舌赤母死子活面赤舌青母活子死面舌俱青或俱白吐沫母子皆死舌色潤則安舌色敗則死兩動一止三四日三四動止應六七五六一止七八朝脈不往來者死脈懸絕者死脈乍疏乍數者死脈躁甚戰而不得汗者死尺脈絕者死十三治溫病要知病欲愈及可解症三部六脈等者此為陰陽和平雖劇當愈熱症脈動數服藥發汗出脈靜者為欲愈三四日脈數更小病人身溫和者為欲解也病人口大渴而為不渴者欲解也太陰症知可解者為不惡熱口渴咳嗽及溲赤也厥陰症知可解者為不譫語神迷舌黑及肢冷也少陰症能解者百中僅見一二戰汗而解者以本虛故見日期未多正尚能逐邪故當汗出也不戰而汗出而解以本不虛正逐邪出也不戰不汗而解者以曾發汗或吐或下或亡血以傷津液待陰陽自和方愈也病人天庭明亮者欲解也病人準頭年壽印堂有黃氣明准者病退而有喜兆也凡病欲愈也或七八日或十三四日腹中轉氣或欠或嚏或思飲食目眥黃而山根亮也病人身能轉易者為欲解也小便自紅轉淡黃者為欲解也耳聾漸能聞者為欲解也下後神氣清者為欲解也二便如常腹無阻滯飲食漸復精神漸振當靜養心神勿驟進肉食易經所謂勿藥有喜也
