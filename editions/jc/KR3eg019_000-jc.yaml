body:
  text: 附溫病辨症方上焦諸方蔥豉湯銀翹散清露飲六乙散益元散雞蘇散加減瀉白散葦莖湯清心涼膈散白虎湯白虎加人參湯加減玉女煎竹葉石膏湯化癍湯雪梨漿生脈散五汁飲清宮湯清營湯犀角地黃湯牛黃清心丸局方至寶丹至寶丹紫雪丹梔子豉湯瓜蒂散導赤散葶藶大棗瀉肺湯河間涼膈散半夏瀉心湯黃連湯小陷胸湯大陷胸湯共三十三方中焦諸方梔子柏皮湯梔子豉加甘草湯梔子豉加薑汁湯茵陳蒿湯調胃承氣湯小承氣湯大承氣湯陶氏黃龍湯新加黃龍湯宣白承氣湯牛黃承氣湯增液承氣湯麻仁丸增液湯蜜煎導豬膽汁方益胃湯豬苓湯五苓湯冬地三黃湯共二十方下焦諸方黃芩湯炙甘草湯加減復脈湯救逆湯一甲煎三甲復脈湯青蒿鱉甲湯黃連阿膠湯小定風珠大定風珠竹葉玉女煎加減桃仁承氣湯桃仁承氣湯抵當湯桃花湯桃花粥共十六方救逆諸方六味地黃湯知柏地黃湯三才湯六君子湯歸脾湯天王補心丹磁朱丸小建中湯理中湯附子理中湯千金溫脾湯獨參湯參附湯四逆湯人參四逆湯白通加人尿加豬膽汁湯通脈四逆加豬膽汁湯金匱腎氣湯共十八湯上中下共計八十七方上焦諸方蔥豉湯葛洪肘後方蔥白一握香豉三錢上二味煎水服銀翹散連翹一兩銀花一兩苦桔梗六錢薄荷六錢竹葉四錢生甘草五錢芥穗四錢豆豉五錢牛蒡子六錢上杵為散每服六錢鮮葦根湯煎香氣大出即取服重者日三服夜一服輕者日二服夜一服清露飲自制連翹殼二錢銀花露八錢兌服苦桔梗一錢苦杏仁錢半去皮尖生甘草五分竹葉六片上五味水煎去渣兌入銀花露溫服加減法風溫原方加薄荷八分牛蒡子錢半冬溫原方去杏仁加鮮北沙參二錢麥冬三錢若風溫溫熱冬溫挾濕者於本方再加蘆根一兩滑石三錢如濕溫濕居二三溫居六七不可用燥濕而宜淡滲者亦可持此法以治之其餘加減之法散見各條茲不復贅六乙散滑石六錢水飛生甘草一兩上為細末新汲水一碗調服三錢益元散即六乙散加辰砂雞蘇散即六乙散加薄荷加減瀉白散桑白皮一錢地骨皮二錢冬瓜仁四錢薏苡仁三錢蘆根汁八錢兌服竹瀝五分上六味水煎溫服葦莖湯葦莖二兩苡仁八錢桃仁三十五枚瓜瓣八錢水五升先煮葦莖煎得二升五去渣納諸藥煮取服清心涼膈散連翹四兩薄荷一兩黃芩一兩酒炒山梔一兩桔梗一兩甘草二兩竹葉七片上藥服法見上白虎湯石膏一兩綿裹知母四錢甘草一錢粳米四錢上四味水八杯煮取三杯去渣溫服白虎加人參湯即白虎湯內加人參一錢服法見上加減玉女煎細生地六錢元參四錢石膏三兩麥冬六錢白知母四錢水八杯煮取三杯分二次服渣再煮一杯服竹葉石膏湯竹葉廿片石膏八錢麥冬三錢人參錢半半夏二錢甘草一錢粳米四錢水八杯煮取五杯去渣納粳米煮米熟湯成去米溫服化癍湯石膏一兩知母四錢元參三錢犀角二錢生甘草二錢粳米三錢水八杯煮取三杯日三服渣再煮一杯夜一服雪梨漿甜水梨一枚新汲涼水內浸半日時時頻飲生脈散真人麥冬三錢人參三錢五味子一錢上三味煎水服五汁飲梨汁荸薺汁鮮葦根汁麥冬汁藕汁或用蔗漿臨時斟酌多少和勻涼服不喜涼者重湯燉溫服清宮湯元參心三錢蓮子心五分竹葉捲心二錢連翹心二錢犀角尖磨沖二錢連心麥冬三錢水五杯煮取三杯分溫再服加減法詳溫病條辨清營湯犀角三錢生地五錢元參三錢竹葉芯一錢銀花三錢麥冬三錢丹參三錢黃連錢半連心麥冬二錢水八杯煮取三杯日三服犀角地黃湯犀角三錢磨沖乾地黃一兩丹皮三錢白芍三錢水五杯煮取二杯分二次服渣再煮一杯服牛黃清心丸西牛黃一兩鬱金一兩黃連一兩黃芩一兩犀角一兩硃砂一兩梅片二錢五分麝香二錢五分珍珠五錢山梔一兩雄黃一兩金箔衣上為極細末煉老蜜為丸每丸一錢金箔為衣蠟護脈虛者人參湯下脈實者銀花薄荷湯下每服一丸局方至寶丹犀角一兩鎊硃砂一兩飛琥珀一兩研玳瑁一兩鎊牛黃五錢麝香五錢以安息香重湯燉化和諸藥為丸一百丸蠟護至寶丹生烏犀角一兩生玳瑁一兩琥珀一兩西牛黃五錢鏡面硃砂一兩研飛安息香一兩五錢為末酒研飛淨一兩熬膏用水安息尤妙雄黃一兩研飛龍腦一錢研麝香一錢研金箔五十片銀箔五十片研為細末將犀玳為細末入余藥研勻將安息香膏重湯煮凝成後入諸藥中和搜成劑丸如梧子大蠟護臨服剖用人參湯化下三丸至五丸紫雪丹黃金一百兩徐云以飛金一萬葉代之磁石石膏寒水石滑石各三斤以上並搗碎用水一斛煮至四斗去渣入下藥羚羊角屑犀角屑青木香各五斤丁香一兩沉香五斤元參升麻各一斤甘草八兩炙以上八前藥汁中再煮取一斗五升去渣再入下藥朴硝十斤硝石四斤徐云二硝太多宜用十分之一二味入前藥汁中微火上煎柳木篾欖不住俟有七升投在水盆中半日欲凝入下藥硃砂三兩麝香當門子一兩二錢五分二味入前藥中攪調令勻瓷器收藏藥成霜雪而色紫新汲水調梔子豉湯梔子五七枚生用香豉四錢綿裹水四杯先煮梔子數沸後納香豉煮取二杯先溫服一杯得吐止後服瓜蒂散瓜蒂一分炒黃赤小豆一分豆豉一撮上二味各別杵為散已合治之取三錢以豆豉一撮用熱湯一杯煮去渣取汁和散溫燉服之導赤散錢乙大生地四錢木通錢半竹葉四片甘草梢一錢上四味水煎服葶藶大棗瀉肺湯葶藶二錢大棗十二枚水三杯煮棗取二杯去棗納葶藶煮一杯頓服河間涼膈散連翹四兩大棗酒浸芒硝各二兩黃芩酒炒一兩甘草二兩薄荷山梔各二兩竹葉為粗末每服三五錢加竹葉七片水一碗半煎一碗去渣入生白蜜一匙微煎溫服半夏瀉心湯半夏三錢黃芩二錢黃連七分人參二錢甘草二錢乾薑二錢大棗四枚水八杯煮取五杯去渣再煎取三杯溫服黃連湯黃連錢半桂枝錢半去皮甘草錢半炙乾薑錢半人參七分半夏錢半大棗四枚水八杯煮取四杯去渣溫服小陷胸湯栝蔞實三錢黃連六錢半夏二錢洗水六杯先煎栝蔞取三杯去渣納諸藥取一杯去渣溫服大陷胸湯大黃六錢去皮芒硝一錢甘遂末三分上三味以水六杯先煎大黃取二杯去渣納芒硝煮一二沸納甘遂末溫服中焦諸方梔子柏皮湯梔子六錢甘草一錢黃柏一錢水四杯煮取杯半去渣溫服梔子豉加甘草湯即梔子豉湯加甘草二錢梔子豉加薑汁湯即梔子豉湯加生薑五錢茵陳蒿湯茵陳蒿四錢大黃一錢五分去皮梔子三個水八杯先煎茵陳取五杯納二味煎取三杯溫服調胃承氣湯大黃二錢酒浸甘草一錢芒硝錢半水三杯煮取一杯去渣納芒硝更上火微煮令沸溫服小承氣湯大黃二錢厚朴八分枳實錢半上三味以水四杯煮取杯半去渣溫服大承氣湯大黃四錢酒洗厚朴錢半炙枳實二錢芒硝三錢上四味以水八杯先煮枳樸取四杯去渣內大黃煮取二杯去渣內芒硝更上微火一兩沸溫服陶氏黃龍湯大黃三錢芒硝二錢厚朴一錢五分枳實一錢甘草一錢人參一錢五分當歸二錢上藥水煎溫服新加黃龍湯細生地五錢人參錢半另煎芒硝一錢元參五錢生大黃五錢麥冬五錢連心當歸錢半海參二條洗生甘草二錢薑汁六匙水八杯煮取三杯先用一杯沖參汁五分薑汁二匙頻服之得便止後服酌服益胃湯一劑宣白承氣湯生石膏五錢生大黃五錢杏仁粉二錢栝蔞皮一錢五分水五杯煮取二杯先服一杯不知再服牛黃承氣湯即以安宮牛黃丸二丸化開納生大黃末三錢先服一杯不知再服增液承氣湯即增液湯內加大黃三錢芒硝錢半水八杯煮取三杯先服一杯不知再服麻仁丸麻仁二兩芍藥五錢枳實五錢大黃一兩去皮厚朴一兩炙去皮杏仁一兩去皮尖上六味為末煉蜜為丸如梧子大飲服十丸漸加以知為度增液湯元參一兩麥冬八錢連心細生地八錢水八杯煮取三杯口乾則與飲令盡不便再作服蜜煎導白蜜四兩一味於銅器內微火煎之待凝如飴糖狀攪之勿令焦著欲可丸並手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以納穀道中以手急抱欲大便時乃去之豬膽汁方豬膽汁一個瀉汁和醋少許以灌穀道中如一食傾當大便也宿食惡物甚效益胃湯沙參三錢麥冬三錢細生地五錢玉竹錢半炒香冰糖一錢水五杯煮取二杯分兩次服渣再煮一杯服豬苓湯豬苓七分茯苓七分阿膠七分滑石七分澤瀉七分水四杯先煮四味至二杯去渣納阿膠烊消溫服五苓湯豬苓十八銖去皮茯苓十八銖澤瀉一兩去銖白朮十八銖桂枝五錢去皮上五味搗為末以白飲和服錢半日服三匙冬地三黃湯麥冬八錢黃連一錢黃芩一錢黃柏一錢葦根汁半杯沖北沙參四錢銀花露半杯沖細生地四錢生甘草五分水八杯煮取三杯分三次服以小便得利為度下焦諸方黃芩湯黃芩二錢芍藥一錢五分甘草一錢炙大棗四個水八杯煮取三杯去渣溫服炙甘草湯炙甘草二錢桂枝錢半人參一錢生薑錢半生地黃八錢麥冬三錢麻仁錢半阿膠二錢大棗四個上九味以清酒六杯先煎八味取三杯去渣內膠烊消盡溫服加減復脈湯葉天士炙甘草二錢阿膠三錢麥冬三錢麻仁五錢生白芍四錢炒生地八錢用甘蔗汁煎上藥入甘蔗汁四兩煎服救逆湯乾地黃甘草各六錢炙白芍六錢生麥冬五錢連心生龍骨四錢生牡蠣八錢阿膠三錢水八杯煮三杯分三次服一甲煎生牡蠣二兩碾細水八杯煮取三杯分溫三服三甲復脈湯炙甘草六錢白芍六錢生麥冬五錢連心阿膠一錢乾地黃六錢麻仁三錢牡蠣五錢生鱉甲八錢生生龜板一兩水八杯煮取三杯分三次服青蒿鱉甲湯青蒿二錢鱉甲五錢細生地四錢知母一錢丹皮三錢水五杯煮取三杯日再服黃連阿膠湯黃連二錢黃芩七分芍藥一錢五分阿膠二錢雞子黃一枚水六杯先煎三物至二杯去渣納膠烊盡少冷納雞子黃攪令相得溫服小定風珠雞子黃一枚去皮真阿膠一錢生龜板六錢淡菜三錢童便一杯水五杯先煮龜板淡菜得二杯去渣入阿膠上火烊化納雞子黃攪令相得再衝童便頻服大定風珠白芍六錢生阿膠二錢生龜板四錢麻仁三錢麥冬六錢連心甘草四錢炙乾地黃六錢鱉甲四錢牡蠣四錢生五味二錢雞子黃二枚生水八杯煮至三杯去渣再入雞子黃攪令相得分三次服竹葉玉女煎即玉女煎加竹葉一錢水五杯煎三杯分溫再服加減桃仁承氣湯大黃三錢制桃仁五錢炒細生地六兩丹皮四錢澤蘭二錢人中白二錢水八杯煎取三杯先服一杯飲六時得下黑血下後神清渴減止後服不知再進桃仁承氣湯桃仁十六個去皮桂枝二錢去皮大黃四錢去皮芒硝一錢甘草二錢水六杯煮取二杯去渣內納芒硝更上火微沸溫服抵當湯水蛭十個熬虻蟲十個去翅足熬桃仁十個去皮尖大黃二錢去皮酒浸上四味挫為麻豆以水五杯煮取三杯去渣溫服桃花湯赤石脂一兩六錢半篩末乾薑一錢粳米四錢水四杯煎二杯入赤石脂末方寸匕分二服一服愈余勿服桃花粥人參二錢炙甘草三錢赤石脂六錢研末白粳米二合水十杯先煮參草得六杯去渣再入粳米煮得三杯納石脂末三錢頻服之利不止再服第二杯如上法利止停後服或先因過用寒涼脈不數身不熱者加乾薑二錢救逆諸方六味地黃湯大熟地八錢丹皮澤瀉茯苓各三錢懷山藥萸肉各三錢水煎服知柏地黃湯即六味地黃加黃柏一錢知母三錢水煎服三才湯人參三錢天冬二錢乾地黃八錢上三味水煎溫服六君子湯人參白朮各三錢土炒陳皮一錢半夏錢半薑棗煎歸脾湯人參二錢黃耆錢